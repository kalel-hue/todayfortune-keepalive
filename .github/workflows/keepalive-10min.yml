name: Keep Alive todaykalel-1 (10,40)

on:
  schedule:
    - cron: '10,40 * * * *'  # 10, 40분
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Keep-Alive Script
        run: node visit-frontend.js
