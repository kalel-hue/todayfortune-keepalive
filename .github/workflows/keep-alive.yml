name: Keep Render Backend Alive

on:
  schedule:
    # 5분마다 실행 (cron 형식: 분 시 일 월 요일)
    - cron: '*/5 * * * *'
  workflow_dispatch: # 수동 실행도 가능하도록

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -f https://todayfortunebackend.onrender.com/api/health || exit 1
        timeout-minutes: 1

