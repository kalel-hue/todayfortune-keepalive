name: Keep Alive kalel6120-1 (2,12,22...)

on:
  schedule:
    - cron: '1/6 * * * *'  # 1, 7, 13, 19, 25, 31, 37, 43, 49, 55분
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Keep-Alive Script
        run: node visit-frontend.js
