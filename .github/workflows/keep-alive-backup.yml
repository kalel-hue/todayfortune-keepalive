name: Keep Alive kalel-hue-2 (1,11,21...)

on:
  schedule:
    - cron: '3/6 * * * *'  # 3, 9, 15, 21, 27, 33, 39, 45, 51, 57분
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Keep-Alive Script
        run: node visit-frontend.js
