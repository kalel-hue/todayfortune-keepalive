name: Keep Alive kalel6120-2 (3,13,23...)

on:
  schedule:
    - cron: '3/10 * * * *'  # 3, 13, 23, 33, 43, 53분
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Keep-Alive Script
        run: node visit-frontend.js
