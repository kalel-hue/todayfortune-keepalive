name: Keep Alive kalel-hue-1 (0,30)

on:
  schedule:
    - cron: '0,30 * * * *'  # 0, 30분
  workflow_dispatch: # 수동 실행도 가능하도록

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Keep-Alive Script
        run: node visit-frontend.js


